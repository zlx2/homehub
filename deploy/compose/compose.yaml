name: homehub

services:
  docker-socket-proxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:v0.4.2
    restart: unless-stopped
    environment:
      CONTAINERS: "1"
      EVENTS: "1"
      INFO: "1"
      NETWORKS: "1"
      PING: "1"
      VERSION: "1"
      POST: "0"
      AUTH: "0"
      BUILD: "0"
      COMMIT: "0"
      CONFIGS: "0"
      DISTRIBUTION: "0"
      EXEC: "0"
      IMAGES: "0"
      NODES: "0"
      PLUGINS: "0"
      SECRETS: "0"
      SERVICES: "0"
      SESSION: "0"
      SWARM: "0"
      SYSTEM: "0"
      TASKS: "0"
      VOLUMES: "0"
    networks:
      - docker-api
    read_only: true
    tmpfs:
      - /run
      - /tmp
      - /var/lib/haproxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  traefik:
    image: traefik:v3.7
    restart: unless-stopped
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: docker-socket-proxy,localhost,127.0.0.1
      no_proxy: docker-socket-proxy,localhost,127.0.0.1
    depends_on:
      - docker-socket-proxy
    ports:
      - "127.0.0.1:18080:8080"
      - "127.0.0.1:18081:8081"
    networks:
      - edge
      - docker-api
      - management
    volumes:
      - ../traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  control:
    image: homehub/control:local
    build:
      context: ../..
      dockerfile: apps/control/Dockerfile
      args:
        VERSION: ${HOMEHUB_VERSION:-dev}
        COMMIT: ${HOMEHUB_COMMIT:-unknown}
        BUILD_TIME: ${HOMEHUB_BUILD_TIME:-unknown}
    restart: unless-stopped
    depends_on:
      traefik:
        condition: service_healthy
    environment:
      HOMEHUB_LISTEN_ADDRESS: :8080
      HOMEHUB_CATALOG_FILE: /etc/homehub/services.json
      HOMEHUB_ENVIRONMENT: development
      HOMEHUB_LOG_LEVEL: info
      HOMEHUB_HEALTH_INTERVAL: 5s
      HOMEHUB_HEALTH_TIMEOUT: 2s
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: control,traefik,localhost,127.0.0.1
      no_proxy: control,traefik,localhost,127.0.0.1
    networks:
      - edge
      - backend
      - management
    volumes:
      - ../catalog/services.json:/etc/homehub/services.json:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "/homehub-control", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      traefik.enable: "true"
      traefik.docker.network: homehub-edge
      traefik.http.routers.homehub-control.entrypoints: web
      traefik.http.routers.homehub-control.rule: PathPrefix(`/api`) || PathPrefix(`/health`)
      traefik.http.routers.homehub-control.priority: "100"
      traefik.http.routers.homehub-control.middlewares: homehub-security-headers@file,homehub-compress@file
      traefik.http.services.homehub-control.loadbalancer.server.port: "8080"
      homehub.id: homehub-control
      homehub.visibility: owner
      homehub.share-enabled: "false"

  portal:
    image: homehub/portal:local
    build:
      context: ../..
      dockerfile: apps/portal/Dockerfile
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        http_proxy: ""
        https_proxy: ""
    restart: unless-stopped
    depends_on:
      control:
        condition: service_healthy
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
    networks:
      - edge
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      traefik.enable: "true"
      traefik.docker.network: homehub-edge
      traefik.http.routers.homehub-portal.entrypoints: web
      traefik.http.routers.homehub-portal.rule: PathPrefix(`/`)
      traefik.http.routers.homehub-portal.priority: "1"
      traefik.http.routers.homehub-portal.middlewares: homehub-security-headers@file,homehub-compress@file
      traefik.http.services.homehub-portal.loadbalancer.server.port: "8080"
      homehub.id: homehub-portal
      homehub.visibility: owner
      homehub.share-enabled: "false"

  postgres:
    image: postgres:18.4-alpine
    profiles:
      - data
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
      TZ: ${TZ:-Asia/Hong_Kong}
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=50
      - -c
      - password_encryption=scram-sha-256
    networks:
      - data
    volumes:
      - ${HOMEHUB_DATA_ROOT:-/srv/homehub}/postgres:/var/lib/postgresql
    secrets:
      - postgres_superuser_password
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  edge:
    name: homehub-edge
  backend:
    name: homehub-backend
    internal: true
  data:
    name: homehub-data
    internal: true
  docker-api:
    name: homehub-docker-api
    internal: true
  management:
    name: homehub-management
    internal: true

secrets:
  postgres_superuser_password:
    file: ${HOMEHUB_SECRETS_DIR:-/srv/homehub/runtime/secrets}/postgres_superuser_password
