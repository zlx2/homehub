name: homehub

services:
  traefik:
    image: traefik:v3.7
    restart: unless-stopped
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: iam,control,drop,portal,acme-challenge,localhost,127.0.0.1
      no_proxy: iam,control,drop,portal,acme-challenge,localhost,127.0.0.1
    depends_on:
      acme-challenge:
        condition: service_healthy
      iam:
        condition: service_healthy
      control:
        condition: service_healthy
      drop:
        condition: service_healthy
      portal:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:18181:8081"
    networks:
      - edge
    volumes:
      - ../traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ../traefik/dynamic:/etc/traefik/dynamic:ro
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/tls-zlx2:/run/homehub-domain-tls:ro
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  cloudflared:
    image: cloudflare/cloudflared:2026.7.2
    restart: unless-stopped
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: traefik,localhost,127.0.0.1
      no_proxy: traefik,localhost,127.0.0.1
    depends_on:
      traefik:
        condition: service_healthy
    command:
      - tunnel
      - --metrics
      - 0.0.0.0:20241
      - run
      - --token-file
      - /run/secrets/cloudflare_tunnel_token
    networks:
      - edge
    volumes:
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/cloudflare_tunnel_token:/run/secrets/cloudflare_tunnel_token:ro
    read_only: true
    tmpfs:
      - /tmp:uid=65532,gid=65532,mode=0700
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "127.0.0.1:20241", "ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  acme-challenge:
    image: nginx:1.29.8-alpine
    restart: unless-stopped
    user: "101:101"
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: localhost,127.0.0.1
      no_proxy: localhost,127.0.0.1
    networks:
      - edge
    volumes:
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/acme-webroot:/usr/share/nginx/html:ro
      - ../acme/nginx.conf:/etc/nginx/nginx.conf:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx:uid=101,gid=101,mode=0750
      - /var/run:uid=101,gid=101,mode=0750
      - /tmp:uid=101,gid=101,mode=0750
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_superuser_password
      HOMEHUB_IAM_DB_PASSWORD_FILE: /run/secrets/iam_db_password
      OPENFGA_DB_PASSWORD_FILE: /run/secrets/openfga_db_password
      HOMEHUB_DROP_DB_PASSWORD_FILE: /run/secrets/drop_db_password
      TZ: ${TZ:-Asia/Hong_Kong}
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=40
      - -c
      - password_encryption=scram-sha-256
    networks:
      - data
    volumes:
      - postgres-data:/var/lib/postgresql
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/drop_db_password:/run/secrets/drop_db_password:ro
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/postgres_superuser_password:/run/secrets/postgres_superuser_password:ro
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/iam_db_password:/run/secrets/iam_db_password:ro
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/openfga_db_password:/run/secrets/openfga_db_password:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  openfga-migrate:
    build:
      context: .
      dockerfile: openfga.Dockerfile
    image: homehub/openfga:wrapper
    depends_on:
      postgres:
        condition: service_healthy
    command: ["migrate"]
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DB_PASSWORD_FILE: /run/secrets/openfga_db_password
      TZ: ${TZ:-Asia/Hong_Kong}
    networks:
      - data
    volumes:
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/openfga_db_password:/run/secrets/openfga_db_password:ro
    restart: "no"
    security_opt:
      - no-new-privileges:true

  openfga:
    build:
      context: .
      dockerfile: openfga.Dockerfile
    image: homehub/openfga:wrapper
    restart: unless-stopped
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    command: ["run"]
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DB_PASSWORD_FILE: /run/secrets/openfga_db_password
      OPENFGA_LOG_FORMAT: json
      OPENFGA_HTTP_ADDR: 0.0.0.0:8080
      OPENFGA_GRPC_ADDR: 0.0.0.0:8081
      OPENFGA_PLAYGROUND_ENABLED: "false"
      OPENFGA_DATASTORE_MAX_OPEN_CONNS: "5"
      OPENFGA_DATASTORE_MAX_IDLE_CONNS: "1"
      TZ: ${TZ:-Asia/Hong_Kong}
    networks:
      - backend
      - data
    ports:
      - "127.0.0.1:18101:8080"
    volumes:
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/openfga_db_password:/run/secrets/openfga_db_password:ro
    security_opt:
      - no-new-privileges:true

  iam:
    image: homehub/iam:local
    build:
      context: ../..
      dockerfile: apps/iam/Dockerfile
      network: host
      args:
        VERSION: ${HOMEHUB_VERSION:-dev}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      openfga:
        condition: service_started
    environment:
      HOMEHUB_IAM_LISTEN_ADDRESS: :8080
      HOMEHUB_IAM_DATABASE_PASSWORD_FILE: /run/secrets/iam_db_password
      HOMEHUB_IAM_OPENFGA_URL: http://openfga:8080
      HOMEHUB_IAM_SIGNING_KEY_FILE: /run/secrets/iam_signing_key
      HOMEHUB_IAM_SIGNING_KEY_ID: homehub-dev-1
      HOMEHUB_IAM_ROOT_AGENT_TOKEN_FILE: /run/secrets/root_agent_token
      HOMEHUB_IAM_AUTH_ENCRYPTION_KEY_FILE: /run/secrets/auth_encryption_key
      HOMEHUB_IAM_OWNER_SETUP_TOKEN_FILE: /run/secrets/owner_setup_token
      HOMEHUB_IAM_ALLOWED_ORIGINS: ${HOMEHUB_IAM_ALLOWED_ORIGINS:-https://zlx2.com,https://www.zlx2.com,https://111.229.205.99,http://127.0.0.1:18080}
      HOMEHUB_IAM_SECURE_COOKIES: ${HOMEHUB_IAM_SECURE_COOKIES:-true}
      HOMEHUB_IAM_PASSKEY_RP_ID: ${HOMEHUB_IAM_PASSKEY_RP_ID:-zlx2.com}
      HOMEHUB_IAM_PASSKEY_ORIGINS: ${HOMEHUB_IAM_PASSKEY_ORIGINS:-https://zlx2.com}
    networks:
      - edge
      - backend
      - data
    ports:
      - "127.0.0.1:18100:8080"
    read_only: true
    volumes:
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/iam_signing_key:/run/secrets/iam_signing_key:ro
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/root_agent_token:/run/secrets/root_agent_token:ro
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/auth_encryption_key:/run/secrets/auth_encryption_key:ro
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/owner_setup_token:/run/secrets/owner_setup_token:ro
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/iam_db_password:/run/secrets/iam_db_password:ro
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "/homehub-iam", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  control:
    image: homehub/control:local
    build:
      context: ../..
      dockerfile: apps/control/Dockerfile
      network: host
      args:
        VERSION: ${HOMEHUB_VERSION:-dev}
    restart: unless-stopped
    depends_on:
      iam:
        condition: service_healthy
    environment:
      HOMEHUB_CONTROL_LISTEN_ADDRESS: :8080
      HOMEHUB_CONTROL_ENVIRONMENT: ${HOMEHUB_ENVIRONMENT:-development}
      HOMEHUB_CONTROL_IAM_JWKS_URL: http://iam:8080/.well-known/jwks.json
      HOMEHUB_CONTROL_CATALOG_FILE: /etc/homehub/catalog.json
      HOMEHUB_CONTROL_HEALTH_TIMEOUT: 1500ms
    networks:
      - edge
      - backend
    ports:
      - "127.0.0.1:18110:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "/homehub-control", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  ai-gateway:
    image: homehub/ai-gateway:local
    build:
      context: ../..
      dockerfile: services/ai-gateway/Dockerfile
      network: host
    restart: unless-stopped
    depends_on:
      iam:
        condition: service_healthy
    environment:
      AI_GATEWAY_LISTEN_ADDRESS: :8080
      AI_GATEWAY_IAM_JWKS_URL: http://iam:8080/.well-known/jwks.json
      AI_GATEWAY_CONFIG_FILE: /etc/homehub-ai/providers.json
    networks:
      - backend
      - egress
    read_only: true
    volumes:
      - ../ai-gateway/providers.json:/etc/homehub-ai/providers.json:ro
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/ai_deepseek_api_key:/run/secrets/ai_deepseek_api_key:ro
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/ai_opencode_go_api_key:/run/secrets/ai_opencode_go_api_key:ro
    tmpfs:
      - /tmp:uid=65532,gid=65532,mode=0700
    healthcheck:
      test: ["CMD", "/ai-gateway", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  drop:
    image: homehub/drop:local
    build:
      context: ../..
      dockerfile: services/drop/Dockerfile
      network: host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      iam:
        condition: service_healthy
    environment:
      HOMEHUB_DROP_LISTEN_ADDRESS: :8080
      HOMEHUB_DROP_DATABASE_HOST: postgres
      HOMEHUB_DROP_DATABASE_PORT: "5432"
      HOMEHUB_DROP_DATABASE_NAME: homehub_drop
      HOMEHUB_DROP_DATABASE_USER: homehub_drop
      HOMEHUB_DROP_DATABASE_PASSWORD_FILE: /run/secrets/drop_db_password
      HOMEHUB_DROP_DATA_DIRECTORY: /data
      HOMEHUB_DROP_IAM_JWKS_URL: http://iam:8080/.well-known/jwks.json
    networks:
      - edge
      - backend
      - data
    ports:
      - "127.0.0.1:18120:8080"
    read_only: true
    volumes:
      - ${HOMEHUB_DATA_ROOT:-/srv/homehub/data}/drop:/data
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/drop_db_password:/run/secrets/drop_db_password:ro
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "/homehub-drop", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  telegram-bridge:
    image: homehub/telegram-bridge:local
    build:
      context: ../..
      dockerfile: services/telegram-bridge/Dockerfile
      network: host
    restart: unless-stopped
    network_mode: host
    depends_on:
      iam:
        condition: service_healthy
      drop:
        condition: service_healthy
    environment:
      TELEGRAM_BRIDGE_LISTEN_ADDRESS: 127.0.0.1:8730
      TELEGRAM_BRIDGE_BOT_TOKEN_FILE: /run/secrets/telegram_bot_token
      TELEGRAM_BRIDGE_IAM_CREDENTIAL_FILE: /run/secrets/iam_machine_credential
      TELEGRAM_BRIDGE_IAM_BASE_URL: http://127.0.0.1:18100
      TELEGRAM_BRIDGE_DROP_BASE_URL: http://127.0.0.1:18120
      TELEGRAM_BRIDGE_ALLOWED_USER_IDS: ${TELEGRAM_BRIDGE_ALLOWED_USER_IDS:-}
      TELEGRAM_BRIDGE_ALLOWED_CHAT_IDS: ${TELEGRAM_BRIDGE_ALLOWED_CHAT_IDS:-}
      TELEGRAM_BRIDGE_TTL_DAYS: ${TELEGRAM_BRIDGE_TTL_DAYS:-1}
      TELEGRAM_BRIDGE_ACK_MODE: ${TELEGRAM_BRIDGE_ACK_MODE:-private}
      HTTP_PROXY: http://127.0.0.1:1081
      HTTPS_PROXY: http://127.0.0.1:1081
      NO_PROXY: localhost,127.0.0.1
      http_proxy: http://127.0.0.1:1081
      https_proxy: http://127.0.0.1:1081
      no_proxy: localhost,127.0.0.1
    read_only: true
    volumes:
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/telegram_bot_token:/run/secrets/telegram_bot_token:ro
      - ${HOMEHUB_RUNTIME_ROOT:-/srv/homehub/runtime}/telegram_bridge_credential:/run/secrets/iam_machine_credential:ro
    tmpfs:
      - /tmp:uid=65532,gid=65532,mode=0700
    healthcheck:
      test: ["CMD", "/telegram-bridge", "healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  portal:
    image: homehub/portal:local
    build:
      context: ../..
      dockerfile: apps/portal/Dockerfile
      network: host
    restart: unless-stopped
    depends_on:
      control:
        condition: service_healthy
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: localhost,127.0.0.1
      no_proxy: localhost,127.0.0.1
    ports:
      - "127.0.0.1:18080:8080"
    networks:
      - edge
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  edge:
    name: homehub-edge
  backend:
    name: homehub-backend
    internal: true
  egress:
    name: homehub-egress
  data:
    name: homehub-data
    internal: true

volumes:
  postgres-data:
    name: homehub-postgres
