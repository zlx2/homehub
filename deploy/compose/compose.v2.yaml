name: homehub-v2

services:
  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${V2_POSTGRES_PASSWORD:?set V2_POSTGRES_PASSWORD}
      HOMEHUB_IAM_DB_PASSWORD: ${V2_IAM_DB_PASSWORD:?set V2_IAM_DB_PASSWORD}
      OPENFGA_DB_PASSWORD: ${V2_OPENFGA_DB_PASSWORD:?set V2_OPENFGA_DB_PASSWORD}
      HOMEHUB_DROP_DB_PASSWORD_FILE: /run/secrets/drop_db_password
      TZ: ${TZ:-Asia/Hong_Kong}
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=40
      - -c
      - password_encryption=scram-sha-256
    networks:
      - data
    volumes:
      - postgres-data:/var/lib/postgresql
      - ../postgres/v2-init:/docker-entrypoint-initdb.d:ro
      - ${V2_RUNTIME_ROOT:-/srv/homehub-v2/runtime}/drop_db_password:/run/secrets/drop_db_password:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  openfga-migrate:
    image: openfga/openfga:v1.15.1
    depends_on:
      postgres:
        condition: service_healthy
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://homehub_openfga:${V2_OPENFGA_DB_PASSWORD}@postgres:5432/homehub_openfga?sslmode=disable
    networks:
      - data
    restart: "no"
    security_opt:
      - no-new-privileges:true

  openfga:
    image: openfga/openfga:v1.15.1
    restart: unless-stopped
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://homehub_openfga:${V2_OPENFGA_DB_PASSWORD}@postgres:5432/homehub_openfga?sslmode=disable
      OPENFGA_LOG_FORMAT: json
      OPENFGA_HTTP_ADDR: 0.0.0.0:8080
      OPENFGA_GRPC_ADDR: 0.0.0.0:8081
      OPENFGA_PLAYGROUND_ENABLED: "false"
      OPENFGA_DATASTORE_MAX_OPEN_CONNS: "5"
      OPENFGA_DATASTORE_MAX_IDLE_CONNS: "1"
    networks:
      - backend
      - data
    ports:
      - "127.0.0.1:18101:8080"
    security_opt:
      - no-new-privileges:true

  iam:
    image: homehub/iam:v2-local
    build:
      context: ../..
      dockerfile: apps/iam/Dockerfile
      network: host
      args:
        VERSION: ${HOMEHUB_VERSION:-dev}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      openfga:
        condition: service_started
    environment:
      HOMEHUB_IAM_LISTEN_ADDRESS: :8080
      HOMEHUB_IAM_DATABASE_URL: postgres://homehub_iam:${V2_IAM_DB_PASSWORD}@postgres:5432/homehub_iam?sslmode=disable
      HOMEHUB_IAM_OPENFGA_URL: http://openfga:8080
      HOMEHUB_IAM_SIGNING_KEY_FILE: /run/secrets/iam_signing_key
      HOMEHUB_IAM_SIGNING_KEY_ID: v2-dev-1
      HOMEHUB_IAM_ROOT_AGENT_TOKEN_FILE: /run/secrets/root_agent_token
    networks:
      - edge
      - backend
      - data
    ports:
      - "127.0.0.1:18100:8080"
    read_only: true
    volumes:
      - ${V2_RUNTIME_ROOT:-/srv/homehub-v2/runtime}/iam_signing_key:/run/secrets/iam_signing_key:ro
      - ${V2_RUNTIME_ROOT:-/srv/homehub-v2/runtime}/root_agent_token:/run/secrets/root_agent_token:ro
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "/homehub-iam", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  control:
    image: homehub/control:v2-local
    build:
      context: ../..
      dockerfile: apps/control/Dockerfile
      network: host
      args:
        VERSION: ${HOMEHUB_VERSION:-dev}
    restart: unless-stopped
    depends_on:
      iam:
        condition: service_healthy
    environment:
      HOMEHUB_CONTROL_LISTEN_ADDRESS: :8080
      HOMEHUB_CONTROL_ENVIRONMENT: ${HOMEHUB_ENVIRONMENT:-development}
      HOMEHUB_CONTROL_IAM_JWKS_URL: http://iam:8080/.well-known/jwks.json
      HOMEHUB_CONTROL_CATALOG_FILE: /etc/homehub/catalog.json
      HOMEHUB_CONTROL_HEALTH_TIMEOUT: 1500ms
    networks:
      - edge
      - backend
    ports:
      - "127.0.0.1:18110:8080"
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "/homehub-control", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  drop:
    image: homehub/drop:v2-local
    build:
      context: ../..
      dockerfile: services/drop/Dockerfile
      network: host
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      iam:
        condition: service_healthy
    environment:
      HOMEHUB_DROP_LISTEN_ADDRESS: :8080
      HOMEHUB_DROP_DATABASE_HOST: postgres
      HOMEHUB_DROP_DATABASE_PORT: "5432"
      HOMEHUB_DROP_DATABASE_NAME: homehub_drop
      HOMEHUB_DROP_DATABASE_USER: homehub_drop
      HOMEHUB_DROP_DATABASE_PASSWORD_FILE: /run/secrets/drop_db_password
      HOMEHUB_DROP_DATA_DIRECTORY: /data
      HOMEHUB_DROP_IAM_JWKS_URL: http://iam:8080/.well-known/jwks.json
    networks:
      - edge
      - backend
      - data
    ports:
      - "127.0.0.1:18120:8080"
    read_only: true
    volumes:
      - ${V2_DATA_ROOT:-/srv/homehub-v2/data}/drop:/data
      - ${V2_RUNTIME_ROOT:-/srv/homehub-v2/runtime}/drop_db_password:/run/secrets/drop_db_password:ro
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "/homehub-drop", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  telegram-bridge:
    image: homehub/telegram-bridge:v2-local
    build:
      context: ../..
      dockerfile: services/telegram-bridge/Dockerfile
      network: host
    restart: unless-stopped
    network_mode: host
    depends_on:
      iam:
        condition: service_healthy
      drop:
        condition: service_healthy
    environment:
      TELEGRAM_BRIDGE_LISTEN_ADDRESS: 127.0.0.1:8730
      TELEGRAM_BRIDGE_BOT_TOKEN_FILE: /run/secrets/telegram_bot_token
      TELEGRAM_BRIDGE_IAM_CREDENTIAL_FILE: /run/secrets/iam_machine_credential
      TELEGRAM_BRIDGE_IAM_BASE_URL: http://127.0.0.1:18100
      TELEGRAM_BRIDGE_DROP_BASE_URL: http://127.0.0.1:18120
      TELEGRAM_BRIDGE_ALLOWED_USER_IDS: ${TELEGRAM_BRIDGE_ALLOWED_USER_IDS:-}
      TELEGRAM_BRIDGE_ALLOWED_CHAT_IDS: ${TELEGRAM_BRIDGE_ALLOWED_CHAT_IDS:-}
      TELEGRAM_BRIDGE_TTL_DAYS: ${TELEGRAM_BRIDGE_TTL_DAYS:-1}
      TELEGRAM_BRIDGE_ACK_MODE: ${TELEGRAM_BRIDGE_ACK_MODE:-private}
      HTTP_PROXY: http://127.0.0.1:1081
      HTTPS_PROXY: http://127.0.0.1:1081
      NO_PROXY: localhost,127.0.0.1
      http_proxy: http://127.0.0.1:1081
      https_proxy: http://127.0.0.1:1081
      no_proxy: localhost,127.0.0.1
    read_only: true
    volumes:
      - ${V2_RUNTIME_ROOT:-/srv/homehub-v2/runtime}/telegram_bot_token:/run/secrets/telegram_bot_token:ro
      - ${V2_RUNTIME_ROOT:-/srv/homehub-v2/runtime}/telegram_bridge_credential:/run/secrets/iam_machine_credential:ro
    tmpfs:
      - /tmp:uid=65532,gid=65532,mode=0700
    healthcheck:
      test: ["CMD", "/telegram-bridge", "healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  portal:
    image: homehub/portal:v2-local
    build:
      context: ../..
      dockerfile: apps/portal/Dockerfile
      network: host
    restart: unless-stopped
    depends_on:
      control:
        condition: service_healthy
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      NO_PROXY: localhost,127.0.0.1
      no_proxy: localhost,127.0.0.1
    ports:
      - "127.0.0.1:18080:8080"
    networks:
      - edge
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  edge:
    name: homehub-v2-edge
  backend:
    name: homehub-v2-backend
    internal: true
  data:
    name: homehub-v2-data
    internal: true

volumes:
  postgres-data:
    name: homehub-v2-postgres
