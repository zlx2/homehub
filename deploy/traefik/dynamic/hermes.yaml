http:
  routers:
    homehub-hermes-transport:
      entryPoints:
        - web
      rule: Path(`/hermes/token`) || Path(`/hermes/ws`)
      priority: 300
      service: homehub-hermes-transport

    homehub-hermes-transport-public:
      entryPoints:
        - public-https
      rule: Path(`/hermes/token`) || Path(`/hermes/ws`)
      priority: 300
      middlewares:
        - homehub-strip-untrusted-identity
        - homehub-forward-auth
        - homehub-hermes-security-headers
      service: homehub-hermes-transport
      tls: {}

  middlewares:
    homehub-hermes-security-headers:
      headers:
        contentTypeNosniff: true
        referrerPolicy: no-referrer
        permissionsPolicy: >-
          camera=(), microphone=(), geolocation=(), payment=(), usb=()
        stsSeconds: 31536000
        stsIncludeSubdomains: false
        stsPreload: false
        customResponseHeaders:
          Server: ""

  services:
    homehub-hermes-transport:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: http://10.0.0.15:7681
