worker_processes 1;
pid /tmp/nginx.pid;

events { worker_connections 128; }

http {
  access_log off;
  error_log /dev/stderr warn;
  include /etc/nginx/mime.types;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    location = /health {
      access_log off;
      return 200 "ok\n";
    }

    location / {
      try_files $uri =404;
    }
  }
}
