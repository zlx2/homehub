openapi: 3.1.0
info:
  title: HomeHub Control API
  version: 0.4.0
  description: Authentication, service authorization, and service-directory contract for HomeHub.
servers:
  - url: https://111.229.205.99
paths:
  /health/live:
    get:
      operationId: live
      responses:
        "200": { description: Process is alive. }
  /health/ready:
    get:
      operationId: ready
      responses:
        "200": { description: Control and its database are ready. }
  /api/v1/auth/session:
    get:
      operationId: getAuthSession
      responses:
        "200":
          description: Authentication and first-run setup state.
  /api/v1/auth/login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200": { description: Session created. }
        "401": { description: Username, password, or TOTP was invalid. }
        "429": { description: Login rate limit reached. }
  /api/v1/auth/logout:
    post:
      operationId: logout
      security: [{ ownerSession: [] }]
      parameters:
        - $ref: "#/components/parameters/CSRFToken"
      responses:
        "204": { description: Session revoked. }
        "403": { description: CSRF validation failed. }
  /api/v1/auth/check:
    get:
      operationId: checkAuthentication
      security: [{ ownerSession: [] }]
      responses:
        "204": { description: Valid session; identity headers are returned for forward-auth. }
        "401": { description: Authentication is required. }
  /api/v1/setup/begin:
    post:
      operationId: beginOwnerSetup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BeginSetupRequest"
      responses:
        "201": { description: Pending owner setup with TOTP provisioning data. }
        "401": { description: Bootstrap token was invalid or expired. }
        "409": { description: Owner setup is no longer available. }
  /api/v1/setup/confirm:
    post:
      operationId: confirmOwnerSetup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmSetupRequest"
      responses:
        "201": { description: Owner activated and session created. }
        "401": { description: TOTP code was invalid. }
  /api/v1/invitations/begin:
    post:
      operationId: beginInvitationEnrollment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BeginInvitationEnrollmentRequest"
      responses:
        "201": { description: Pending friend enrollment with TOTP provisioning data. }
        "401": { description: Invitation is invalid or expired. }
        "409": { description: Invitation is already claimed or username is unavailable. }
  /api/v1/invitations/confirm:
    post:
      operationId: confirmInvitationEnrollment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmSetupRequest"
      responses:
        "201": { description: Friend account and session created. }
        "401": { description: TOTP code was invalid. }
        "409": { description: Invitation or username is no longer available. }
  /api/v1/system:
    get:
      operationId: getSystem
      security: [{ ownerSession: [] }]
      responses:
        "200": { description: HomeHub build and environment information. }
        "401": { description: Authentication is required. }
  /api/v1/services:
    get:
      operationId: listServices
      security: [{ ownerSession: [] }]
      responses:
        "200": { description: Registered services with sanitized health state. }
        "401": { description: Authentication is required. }
  /api/v1/services/{id}:
    get:
      operationId: getService
      security: [{ ownerSession: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: One registered service. }
        "401": { description: Authentication is required. }
        "404": { description: Service is not registered. }
  /api/v1/admin/principals:
    get:
      operationId: listPrincipals
      security: [{ ownerSession: [] }]
      responses:
        "200": { description: Principals available as service-grant subjects. }
        "403": { description: Administrator scope is required. }
  /api/v1/admin/service-grants:
    get:
      operationId: listServiceGrants
      security: [{ ownerSession: [] }]
      responses:
        "200": { description: Active, unexpired service grants. }
        "403": { description: Administrator scope is required. }
    post:
      operationId: createServiceGrant
      security: [{ ownerSession: [] }]
      parameters:
        - $ref: "#/components/parameters/CSRFToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceGrantRequest"
      responses:
        "201": { description: Service grant created or renewed. }
        "400": { description: Principal, service, or expiry is invalid. }
        "403": { description: Administrator, Origin, or CSRF validation failed. }
  /api/v1/admin/service-grants/{id}:
    delete:
      operationId: revokeServiceGrant
      security: [{ ownerSession: [] }]
      parameters:
        - $ref: "#/components/parameters/CSRFToken"
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Service grant revoked. }
        "403": { description: Administrator, Origin, or CSRF validation failed. }
        "404": { description: Active grant was not found. }
  /api/v1/admin/invitations:
    get:
      operationId: listInvitations
      security: [{ ownerSession: [] }]
      responses:
        "200": { description: Invitations without their one-time plaintext tokens. }
        "403": { description: Administrator scope is required. }
    post:
      operationId: createInvitation
      security: [{ ownerSession: [] }]
      parameters:
        - $ref: "#/components/parameters/CSRFToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationRequest"
      responses:
        "201": { description: Invitation created; plaintext token is returned once. }
        "400": { description: Expiry or service selection is invalid. }
        "403": { description: Administrator, Origin, or CSRF validation failed. }
  /api/v1/admin/invitations/{id}:
    delete:
      operationId: revokeInvitation
      security: [{ ownerSession: [] }]
      parameters:
        - $ref: "#/components/parameters/CSRFToken"
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Invitation revoked. }
        "403": { description: Administrator, Origin, or CSRF validation failed. }
        "404": { description: Active invitation was not found. }
components:
  securitySchemes:
    ownerSession:
      type: apiKey
      in: cookie
      name: __Host-homehub_session
  parameters:
    CSRFToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema: { type: string }
  schemas:
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password, totp_code]
      properties:
        username: { type: string, minLength: 3, maxLength: 64 }
        password: { type: string, minLength: 12, maxLength: 256 }
        totp_code: { type: string, pattern: "^[0-9]{6}$" }
    BeginSetupRequest:
      type: object
      additionalProperties: false
      required: [bootstrap_token, username, password]
      properties:
        bootstrap_token: { type: string }
        username: { type: string, pattern: "^[a-zA-Z0-9_.-]{3,64}$" }
        password: { type: string, minLength: 12, maxLength: 256 }
    ConfirmSetupRequest:
      type: object
      additionalProperties: false
      required: [setup_id, totp_code]
      properties:
        setup_id: { type: string, format: uuid }
        totp_code: { type: string, pattern: "^[0-9]{6}$" }
    ServiceGrantRequest:
      type: object
      additionalProperties: false
      required: [principal_id, service_id]
      properties:
        principal_id: { type: string, format: uuid }
        service_id: { type: string, pattern: "^[a-z][a-z0-9-]{1,62}$" }
        expires_at:
          type: [string, "null"]
          format: date-time
    BeginInvitationEnrollmentRequest:
      type: object
      additionalProperties: false
      required: [token, username, password]
      properties:
        token: { type: string, minLength: 32 }
        username: { type: string, pattern: "^[a-zA-Z0-9_.-]{3,64}$" }
        password: { type: string, minLength: 12, maxLength: 256 }
    CreateInvitationRequest:
      type: object
      additionalProperties: false
      required: [service_ids]
      properties:
        service_ids:
          type: array
          uniqueItems: true
          items: { type: string, pattern: "^[a-z][a-z0-9-]{1,62}$" }
        expires_at:
          type: [string, "null"]
          format: date-time
