openapi: 3.1.0
info:
  title: HomeHub Control API
  version: 0.1.0
  description: Development contract for the HomeHub control plane.
servers:
  - url: /
paths:
  /health/live:
    get:
      operationId: live
      responses:
        "200":
          description: Process is alive.
  /health/ready:
    get:
      operationId: ready
      responses:
        "200":
          description: Required local configuration has loaded.
  /api/v1/system:
    get:
      operationId: getSystem
      responses:
        "200":
          description: HomeHub build and environment information.
  /api/v1/services:
    get:
      operationId: listServices
      responses:
        "200":
          description: Registered services with sanitized health state.
  /api/v1/services/{id}:
    get:
      operationId: getService
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: One registered service.
        "404":
          description: Service is not registered.
