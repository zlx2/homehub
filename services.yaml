# HomeHub unified service manifest — single source of truth.
# IAM manifests, Control catalog, and Traefik routes derive from this file.
# Compose handles only runtime parameters (ports, volumes, healthchecks).

version: 1

services:
  - id: iam
    name: 身份与权限
    description: 用户、会话、Passkey、机器身份、令牌签发、授权编排
    audience: homehub-iam
    kind: control-plane
    route: /api/iam
    visibility: owner
    health: http://iam:8080/health/ready
    permissions:
      - iam.principal.read
      - iam.principal.manage
      - iam.grant.manage
      - iam.audit.read

  - id: control
    name: 系统看板
    description: 服务状态聚合
    audience: homehub-control
    kind: control-plane
    route: /api/control
    visibility: owner
    health: http://control:8080/health/ready
    permissions: []

  - id: portal
    name: HomeHub Portal
    description: 登录页与聚合首页
    audience: homehub-portal
    kind: portal
    route: /
    visibility: owner
    health: http://portal:8080/health
    permissions: []

  - id: drop
    name: Drop
    description: 原图与文本临时中转服务
    audience: homehub-drop
    kind: business-service
    route: /drop
    visibility: shared
    health: http://drop:8080/health/ready
    permissions:
      - drop.item.create
      - drop.item.read
      - drop.item.list
      - drop.item.delete

  - id: telegram-bridge
    name: Telegram Bridge
    description: Telegram 消息转发到 Drop
    audience: homehub-telegram-bridge
    kind: bridge
    route: null
    visibility: internal
    health: http://host.docker.internal:8730/health/ready
    permissions:
      - drop.item.create

  - id: ai-gateway
    name: AI Gateway
    description: 内网 AI 模型路由与 SSE 流式代理
    audience: homehub-ai-gateway
    kind: infrastructure-service
    route: null
    visibility: internal
    health: http://ai-gateway:8080/health/ready
    permissions:
      - ai.model.fast
      - ai.model.reasoning
      - ai.model.coding
