global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO
  format: json

accessLog:
  format: json

api:
  dashboard: true
  insecure: false

ping:
  entryPoint: admin

entryPoints:
  web:
    address: ":8080"
    forwardedHeaders:
      insecure: false
  admin:
    address: ":8081"
  public-web:
    address: ":8082"
    forwardedHeaders:
      insecure: false
  public-https:
    address: ":8443"
    forwardedHeaders:
      insecure: false

providers:
  docker:
    endpoint: tcp://docker-socket-proxy:2375
    exposedByDefault: false
    network: homehub-edge
    watch: true
  file:
    directory: /etc/traefik/dynamic
    watch: true
