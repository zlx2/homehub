openapi: 3.1.0
info:
  title: HomeHub Demo Counter API
  version: 1.0.0
paths:
  /api/state:
    get:
      summary: Read the durable shared counter
      responses:
        "200":
          description: Current counter state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CounterState"
  /api/increment:
    post:
      summary: Increase the shared counter by one
      responses:
        "200": { description: Updated counter state }
        "403": { description: Origin is not allowed }
  /api/decrement:
    post:
      summary: Decrease the shared counter by one
      responses:
        "200": { description: Updated counter state }
        "403": { description: Origin is not allowed }
  /api/reset:
    post:
      summary: Reset the shared counter to zero
      responses:
        "200": { description: Updated counter state }
        "403": { description: Origin is not allowed }
  /health/live:
    get:
      summary: Liveness probe
      responses:
        "200": { description: Service is live }
components:
  schemas:
    CounterState:
      type: object
      required: [value, updated_at]
      properties:
        value:
          type: integer
          minimum: -1000000
          maximum: 1000000
        updated_at:
          type: integer
          description: Unix timestamp in seconds
