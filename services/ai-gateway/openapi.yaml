openapi: 3.1.0
info:
  title: HomeHub AI Gateway
  version: 0.1.0
  description: Internal OpenAI-compatible model gateway using IAM access tokens and per-model permissions.
paths:
  /health/live:
    get:
      security: []
      responses:
        "204": { description: Process is alive }
  /health/ready:
    get:
      security: []
      responses:
        "204": { description: Configuration and provider credentials are loaded }
  /v1/models:
    get:
      description: Lists only model aliases permitted by the signed delegation.
      responses:
        "200": { description: Available model aliases }
        "401": { description: Signature, issuer, audience, or expiry is invalid }
        "403": { description: No ai.model permission is present }
  /v1/chat/completions:
    post:
      description: OpenAI-compatible chat completion. Uses SSE when stream is true.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              properties:
                model: { type: string, description: Stable HomeHub model alias }
                messages:
                  type: array
                  minItems: 1
                  items: { type: object, additionalProperties: true }
                stream: { type: boolean, default: false }
              additionalProperties: true
      responses:
        "200": { description: Completion JSON or SSE stream }
        "400": { description: Invalid or oversized request }
        "401": { description: Invalid HomeHub AI identity }
        "403": { description: Model is outside the signed service policy }
        "404": { description: Model alias does not exist }
        "429": { description: Upstream provider rate limit }
        "502": { description: Provider is unavailable or rejected its credential }
components:
  securitySchemes:
    homehubAccessToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - homehubAccessToken: []
