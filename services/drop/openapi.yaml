openapi: 3.1.0
info:
  title: HomeHub Drop API
  version: 3.0.0
  description: Original-byte temporary text and file relay protected by HomeHub IAM access tokens.
security:
  - accessToken: []
paths:
  /health/live:
    get:
      security: []
      operationId: getDropLiveness
      responses: {"200": {description: Process is alive}}
  /health/ready:
    get:
      security: []
      operationId: getDropReadiness
      responses: {"200": {description: Database and file volume are ready}, "503": {description: Dependency unavailable}}
  /v1/items:
    post:
      operationId: createDropItem
      x-homehub-permissions: [drop.item.create]
      parameters:
        - {name: Idempotency-Key, in: header, schema: {type: string, minLength: 16, maxLength: 200}}
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                text: {type: string}
                ttl_days: {type: integer, enum: [1, 3, 7]}
                files: {type: array, maxItems: 10, items: {type: string, format: binary}}
      responses: {"201": {description: Item created}, "401": {description: Invalid token}, "403": {description: Missing permission}}
    get:
      operationId: listDropItems
      x-homehub-permissions: [drop.item.list]
      responses: {"200": {description: Active items}, "401": {description: Invalid token}, "403": {description: Missing permission}}
  /v1/items/{id}:
    parameters: [{name: id, in: path, required: true, schema: {type: string}}]
    get:
      operationId: getDropItem
      x-homehub-permissions: [drop.item.read]
      responses: {"200": {description: Item metadata}, "404": {description: Item not found}}
    delete:
      operationId: deleteDropItem
      x-homehub-permissions: [drop.item.delete]
      responses: {"204": {description: Item deleted}, "404": {description: Item not found}}
  /v1/attachments/{id}:
    parameters: [{name: id, in: path, required: true, schema: {type: string}}]
    get:
      operationId: getDropAttachment
      x-homehub-permissions: [drop.item.read]
      parameters: [{name: download, in: query, schema: {type: integer, enum: [1]}}]
      responses: {"200": {description: Unmodified original attachment bytes}, "404": {description: Attachment not found}}
components:
  securitySchemes:
    accessToken:
      type: http
      scheme: bearer
      bearerFormat: HomeHub EdDSA access token
