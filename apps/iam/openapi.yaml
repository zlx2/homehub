openapi: 3.1.0
info:
  title: HomeHub IAM API
  version: 0.1.0
paths:
  /.well-known/jwks.json:
    get:
      operationId: getJSONWebKeySet
      responses:
        "200":
          description: Current and retiring public token verification keys
  /v1/tokens/exchange:
    post:
      operationId: exchangeMachineCredential
      security:
        - machineCredential: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [audience, permissions]
              properties:
                audience:
                  type: string
                permissions:
                  type: array
                  minItems: 1
                  maxItems: 32
                  items:
                    type: string
      responses:
        "200":
          description: Short-lived audience-bound access token
        "400":
          description: Unknown audience or permission
        "401":
          description: Invalid machine credential
        "403":
          description: Principal is not allowed to request the permission
  /health/live:
    get:
      operationId: getLiveness
      responses:
        "200":
          description: Process is alive
  /health/ready:
    get:
      operationId: getReadiness
      responses:
        "200":
          description: IAM dependencies are ready
  /v1/metadata:
    get:
      operationId: getIAMMetadata
      responses:
        "200":
          description: Stable IAM protocol metadata
components:
  securitySchemes:
    machineCredential:
      type: http
      scheme: bearer
