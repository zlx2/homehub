openapi: 3.1.0
info:
  title: HomeHub IAM API
  version: 0.2.0
paths:
  /.well-known/jwks.json:
    get:
      operationId: getJSONWebKeySet
      responses:
        "200":
          description: Current and retiring public token verification keys
  /v1/tokens/exchange:
    post:
      operationId: exchangeMachineCredential
      security:
        - machineCredential: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [audience, permissions]
              properties:
                audience:
                  type: string
                permissions:
                  type: array
                  minItems: 1
                  maxItems: 32
                  items:
                    type: string
      responses:
        "200":
          description: Short-lived audience-bound access token
        "400":
          description: Unknown audience or permission
        "401":
          description: Invalid machine credential
        "403":
          description: Principal is not allowed to request the permission
  /v1/machine-identities:
    post:
      operationId: createMachineIdentity
      description: Creates a device, node, workload, or agent and returns its credential exactly once.
      security:
        - accessToken: []
      x-homehub-permissions: [iam.principal.manage, iam.grant.manage]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, display_name, external_subject, grants]
              properties:
                kind:
                  type: string
                  enum: [device, node, workload, agent]
                display_name:
                  type: string
                  maxLength: 128
                external_subject:
                  type: string
                grants:
                  type: array
                  minItems: 1
                  maxItems: 16
                  items:
                    type: object
                    required: [service_id, relation]
                    properties:
                      service_id:
                        type: string
                      relation:
                        type: string
      responses:
        "201":
          description: Machine identity and one-time credential
        "400":
          description: Invalid kind, service, relation, or request
        "401":
          description: Missing, invalid, expired, or wrong-audience token
        "403":
          description: Token lacks iam.principal.manage or iam.grant.manage
        "409":
          description: External machine identity already exists
  /v1/session:
    get:
      operationId: getBrowserSession
      responses:
        "200":
          description: Browser session and initial-setup state
  /v1/setup/begin:
    post:
      operationId: beginOwnerSetup
      responses:
        "201":
          description: Pending owner setup and TOTP provisioning data
  /v1/setup/confirm:
    post:
      operationId: confirmOwnerSetup
      responses:
        "201":
          description: Owner created and browser session established
  /v1/login:
    post:
      operationId: loginWithPasswordAndTOTP
      responses:
        "200":
          description: Browser session established
        "401":
          description: Invalid credentials
  /v1/logout:
    post:
      operationId: logoutBrowserSession
      security:
        - browserSession: []
      responses:
        "204":
          description: Browser session revoked
  /v1/passkeys/login/begin:
    post:
      operationId: beginDiscoverablePasskeyLogin
      responses:
        "200":
          description: WebAuthn credential request options
  /v1/passkeys/login/finish:
    post:
      operationId: finishDiscoverablePasskeyLogin
      responses:
        "200":
          description: Passkey verified and browser session established
        "401":
          description: Passkey verification failed
  /v1/passkeys/registration/begin:
    post:
      operationId: beginPasskeyRegistration
      security:
        - browserSession: []
      responses:
        "200":
          description: WebAuthn credential creation options
  /v1/passkeys/registration/finish:
    post:
      operationId: finishPasskeyRegistration
      security:
        - browserSession: []
      responses:
        "201":
          description: Passkey registered
  /v1/passkeys:
    get:
      operationId: listPasskeys
      security:
        - browserSession: []
      responses:
        "200":
          description: Passkeys belonging to the current human principal
  /v1/passkeys/{id}:
    delete:
      operationId: deletePasskey
      security:
        - browserSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Passkey deleted
        "404":
          description: Passkey not found
  /health/live:
    get:
      operationId: getLiveness
      responses:
        "200":
          description: Process is alive
  /health/ready:
    get:
      operationId: getReadiness
      responses:
        "200":
          description: IAM dependencies are ready
  /v1/metadata:
    get:
      operationId: getIAMMetadata
      responses:
        "200":
          description: Stable IAM protocol metadata
components:
  securitySchemes:
    machineCredential:
      type: http
      scheme: bearer
    accessToken:
      type: http
      scheme: bearer
      bearerFormat: HomeHub EdDSA access token
    browserSession:
      type: apiKey
      in: cookie
      name: hh_session
